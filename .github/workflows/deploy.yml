name: Orbital Command CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orbital_command_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint Checks
      run: npm run lint
      continue-on-error: true # allow compiling logs if some stylistic lints warnings exist

    - name: Generate Prisma Client Types
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orbital_command_test?schema=public

    - name: Verify Next.js Production Compile
      run: npm run build
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orbital_command_test?schema=public
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: github-actions-ci-test-secret-key-123
        NEXT_TELEMETRY_DISABLED: 1

  docker-build:
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      continue-on-error: true # fallback to default docker build if buildx setup has registry issues

    - name: Build production container image
      run: |
        docker build -t orbital-command:latest .
